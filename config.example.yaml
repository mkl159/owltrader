# Configuration d'exemple OwlTrader — copie en config.yaml et adapte.

langue: fr
fuseau_horaire: Europe/Paris

# Actifs surveillés par défaut (format CLASSE:SYMBOLE)
watchlist:
  - STOCK:AAPL
  - INDEX:^FCHI        # CAC 40
  - COMMO:GOLD
  - FX:EURUSD
  - CRYPTO:BTC

# Univers balayé par le screener (/idees) pour proposer des pistes d'achat.
# Ajoute/retire librement des actifs (format CLASSE:SYMBOLE).
univers_scan:
  - STOCK:AAPL
  - STOCK:MSFT
  - STOCK:GOOGL
  - STOCK:AMZN
  - STOCK:NVDA
  - STOCK:META
  - STOCK:TSLA
  - STOCK:MC.PA        # LVMH
  - STOCK:OR.PA        # L'Oréal
  - STOCK:TTE.PA       # TotalEnergies
  - INDEX:^GSPC        # S&P 500
  - CRYPTO:BTC
  - CRYPTO:ETH
  - CRYPTO:SOL
  - COMMO:GOLD
  - COMMO:OIL

# Sources de données activées, par ordre de priorité (repli automatique).
# Le routeur garde toujours la donnée la plus récente.
sources_marche:
  - yfinance
  - stooq
  - coingecko          # crypto
  - frankfurter        # devises (BCE)

sources_actu:
  - yahoo_rss
  - coindesk_rss
  - gdelt

# Fréquences de rafraîchissement (minutes)
frequences:
  crypto: 5
  fx: 10
  actions: 15
  auto: 5               # mode autonome : lecture du marché toutes les 5 min
  actualites: 30
  ia_news_batch: 60

# Mode autonome (paper-trading fictif)
paper:
  capital: 1000          # capital fictif de départ
  frais_pct: 0.20        # frais de courtage en % (achat ET vente)
  frais_min: 1.0         # frais minimum par transaction
  max_positions: 5       # nombre max de positions simultanées
  alloc_pct: 20          # % du capital investi par position
  devise: EUR
  # Risk manager — calibré sur 10 ans (krach COVID + bear 2022)
  stop_loss_pct: 25      # filet large quasi gratuit (protège d'un actif qui s'effondre)
  max_dd_pause: 0        # coupe-circuit DÉSACTIVÉ : il ratait les reprises et plombait le rendement
  backtest_period: 5y    # fenêtre de simulation / auto-réglage (5 ans = plusieurs régimes)
  regime_filter: true    # n'acheter que si le marché (S&P 500) est au-dessus de sa MM200 (anti-bear)
  regime_symbol: "INDEX:^GSPC"

# Moteur de signaux
signaux:
  rsi_survente: 30
  rsi_surachat: 70
  ratio_risque_rendement_min: 1.5
  atr_multiplicateur_stop: 2.0
  anti_spam_heures: 4        # 1 signal max par actif sur cette fenêtre

# IA des actualités : "local" (gratuit) ou "llm" (clé API requise)
ia_actualites:
  mode: local
