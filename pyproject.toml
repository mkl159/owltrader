[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"
markers = ["horaires_reels: teste market_open_now sans le patch 'marché toujours ouvert'"]

[tool.ruff]
line-length = 110

[tool.ruff.lint]
# F = erreurs pyflakes (vrais bugs), E9 = erreurs de syntaxe
select = ["F", "E9"]
